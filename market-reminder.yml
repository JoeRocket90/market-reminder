name: Market Scan Reminder

on:
  schedule:
    # ─────────────────────────────────────────────────────────
    # GitHub Actions cron läuft in UTC!
    # Python-Script filtert intern auf MEZ-Zeitfenster,
    # daher beide Zeiten für Sommer-UND Winterzeit getriggert:
    # ─────────────────────────────────────────────────────────
    # 09:30 MEZ = 07:30 UTC (Sommer CEST) / 08:30 UTC (Winter CET)
    - cron: '30 7 * * 1-5'    # Sommer-Zeit Morgen
    - cron: '30 8 * * 1-5'    # Winter-Zeit Morgen
    # 16:30 MEZ = 14:30 UTC (Sommer) / 15:30 UTC (Winter)
    - cron: '30 14 * * 1-5'   # Sommer-Zeit Nachmittag
    - cron: '30 15 * * 1-5'   # Winter-Zeit Nachmittag

  # Manueller Trigger für Testing / ad-hoc Reminder
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet requests

      - name: Run reminder script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python reminder.py
